<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD299"/>
      <stop offset="0.6" stop-color="#FF7A1A"/>
      <stop offset="1" stop-color="#FF4D3D"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF7A1A" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FF7A1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- glass -->
  <path d="M14 16 L50 16 L36 38 L36 50 L42 52 L42 56 L22 56 L22 52 L28 50 L28 38 Z"
        stroke="url(#g)" stroke-width="2.4" stroke-linejoin="round" fill="rgba(255,122,26,0.08)"/>
  <!-- liquid -->
  <path d="M19 21 L45 21 L36 35 L28 35 Z" fill="url(#g)"/>
  <!-- skyline straw -->
  <g stroke="#FFC15E" stroke-width="2" stroke-linecap="round">
    <line x1="38" y1="6" x2="38" y2="22"/>
  </g>
  <!-- buildings on top of straw -->
  <g fill="#FFC15E">
    <rect x="35" y="2" width="2.4" height="6"/>
    <rect x="38.5" y="0" width="2.4" height="8"/>
    <rect x="42" y="3" width="2" height="5"/>
  </g>
  <!-- location pin inside drink -->
  <circle cx="32" cy="27" r="2.2" fill="#0a0a0c"/>
  <circle cx="32" cy="27" r="0.9" fill="#FFC15E"/>
</svg>
